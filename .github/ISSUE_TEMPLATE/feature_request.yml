name: ✨ Feature Request
description: Suggest a capability or an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome. The clearer the problem behind the request, the better the odds it lands.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do today, and what gets in the way?
      placeholder: "When I ..., I have to ... because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      placeholder: How you imagine it working
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat pane
        - CLI pane
        - MCP tools (IDE capabilities exposed to the agent)
        - Options / profiles
        - Menus, notifications, general IDE integration
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Including "I do it by hand like this" — that's useful too.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, links, or how another tool solves it
