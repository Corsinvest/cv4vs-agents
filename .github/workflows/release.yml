name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: true

jobs:
  release:
    # A VSIX needs MSBuild and the VS SDK: .NET Framework 4.8 can't be built on Linux.
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Corsinvest.VisualStudio.Agents/Chat/WebViewSrc/package-lock.json

      # The Contracts project regenerates core/generated/*.ts from the C# DTOs during the build,
      # through a global tool the runners do not ship.
      - name: Install TypeGen
        run: dotnet tool install -g dotnet-typegen

      # VsixVersion in Directory.Build.props is the single source of truth, and a Release build
      # already fails if the manifest or AssemblyInfo disagree with it. The tag is the one thing
      # nothing checks -- and the Marketplace rejects an upload whose version was already
      # published, so a mismatch found here is the cheap version of that failure.
      - name: Extract and validate version
        id: version
        shell: pwsh
        run: |
          $props = [xml](Get-Content Directory.Build.props)
          $projectVersion = ($props.Project.PropertyGroup.VsixVersion | Where-Object { $_ }).Trim()

          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.tag }}' }
                 else { '${{ github.ref_name }}' }
          $tagVersion = $tag -replace '^v', ''

          Write-Host "Project version: $projectVersion"
          Write-Host "Tag version    : $tagVersion"

          # A prerelease tag (v1.1.0-rc1) carries a suffix the manifest cannot: Identity Version
          # takes digits only. Compare the numeric part and let the suffix live on the tag alone.
          $tagNumeric = ($tagVersion -split '-')[0]
          if ($projectVersion -ne $tagNumeric) {
              Write-Host "::error::Version mismatch — Directory.Build.props says $projectVersion, tag says $tagVersion"
              exit 1
          }

          "version=$tagVersion" >> $env:GITHUB_OUTPUT
          "prerelease=$(if ($tagVersion -match '-') { 'true' } else { 'false' })" >> $env:GITHUB_OUTPUT
          Write-Host "Version validated: $tagVersion"

      - name: Restore
        run: msbuild cv4vs-agents.sln -t:Restore -p:Configuration=Release -v:minimal

      - name: Build
        run: msbuild cv4vs-agents.sln -t:Build -p:Configuration=Release -p:DeployExtension=false -v:minimal

      # Same gate as the quality workflow: a VSIX missing part of the WebView installs cleanly and
      # breaks at runtime, and a release is the worst place to discover that. Compare the package
      # against dist\ rather than a list of names, so a new WebView file cannot slip out unnoticed.
      - name: Verify VSIX contains the WebView
        shell: pwsh
        run: |
          $dist = 'src/Corsinvest.VisualStudio.Agents/Chat/WebViewSrc/dist'
          $expected = Get-ChildItem $dist -Recurse -File |
              ForEach-Object { 'WebView2/' + $_.FullName.Substring((Resolve-Path $dist).Path.Length + 1).Replace('\', '/') }
          if (-not $expected) {
              Write-Host "::error::$dist is empty — the WebView was never built"
              exit 1
          }

          $vsix = Get-ChildItem src/Corsinvest.VisualStudio.Agents/bin/Release/*.vsix | Select-Object -First 1
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead($vsix.FullName)
          $entries = $zip.Entries.FullName
          $zip.Dispose()

          $missing = $expected | Where-Object { $_ -notin $entries }
          if ($missing) {
              Write-Host "::error::VSIX is missing $($missing.Count) of $($expected.Count) WebView files: $($missing -join ', ')"
              exit 1
          }
          Write-Host "VSIX OK: $($entries.Count) entries, all $($expected.Count) WebView files present."

      # The section for this version, verbatim. Written for users, so it beats generated commit
      # lists -- those are appended underneath by generate_release_notes.
      - name: Extract changelog section
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $lines = Get-Content CHANGELOG.md

          # A preview describes the release it is a candidate for, so v1.0.0-rc1 falls back to the
          # [1.0.0] section rather than demanding one per candidate.
          $start = ($lines | Select-String -Pattern "^## \[$([regex]::Escape($version))\]" | Select-Object -First 1).LineNumber
          if (-not $start) {
              $base = ($version -split '-')[0]
              $start = ($lines | Select-String -Pattern "^## \[$([regex]::Escape($base))\]" | Select-Object -First 1).LineNumber
          }
          if (-not $start) {
              Write-Host "::error::CHANGELOG.md has no section for $version"
              exit 1
          }
          $rest = $lines[$start..($lines.Count - 1)]
          $end = ($rest | Select-String -Pattern '^## \[' | Select-Object -First 1).LineNumber
          $notes = if ($end) { $rest[0..($end - 2)] } else { $rest }

          # Say where to get it: a stable release carries no .vsix, so without this line the page
          # lists changes and offers nothing to install.
          # The suffix lives on the tag only -- Identity Version takes digits -- so rc1 and rc2 are
          # both 1.1.0 to VS, and installing the second over the first exits 1001 "already
          # installed". Say so here: the installer's own message explains nothing.
          $install = if ('${{ steps.version.outputs.prerelease }}' -eq 'true') {
              'Preview build — install the attached `.vsix` by double-clicking it. Uninstall any earlier preview of the same version first: previews share one version number, so Visual Studio treats the second one as already installed. Stable releases are on the Marketplace.'
          } else {
              'Install from the [Visual Studio Marketplace](https://marketplace.visualstudio.com/items?itemName=Corsinvest.cv4vs-agents), or from Extensions → Manage Extensions in the IDE.'
          }

          "notes<<CHANGELOG_EOF" >> $env:GITHUB_OUTPUT
          ($notes -join "`n").Trim() >> $env:GITHUB_OUTPUT
          "" >> $env:GITHUB_OUTPUT
          $install >> $env:GITHUB_OUTPUT
          "" >> $env:GITHUB_OUTPUT
          "[Marketplace](https://marketplace.visualstudio.com/items?itemName=Corsinvest.cv4vs-agents) | [Website](https://www.corsinvest.it)" >> $env:GITHUB_OUTPUT
          "CHANGELOG_EOF" >> $env:GITHUB_OUTPUT

      # The .vsix rides along on prereleases only: those have no other channel, since the
      # Marketplace takes neither a -rc suffix nor a second upload of the same version. Stable
      # releases are installed from the Marketplace, so attaching the file there would offer a
      # second copy that updates itself and one that doesn't.
      #
      # Marketplace upload stays manual for now: the portal asks for categories, screenshots and
      # the overview, and those are set once by hand before automating around them.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: ${{ steps.version.outputs.prerelease == 'true' && 'src/Corsinvest.VisualStudio.Agents/bin/Release/*.vsix' || '' }}
